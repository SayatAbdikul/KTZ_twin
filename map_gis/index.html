<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KTZ GIS Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <link rel="stylesheet" href="./styles.css" />
</head>

<body>
    <div class="shell">
        <aside class="sidebar">
            <h1>KTZ GIS</h1>
            <p class="subtitle">Live locomotive position</p>

            <nav class="links">
                <a href="http://localhost:5183/" target="_blank" rel="noreferrer">Dashboard</a>
                <a href="http://localhost:5183/diagram" target="_blank" rel="noreferrer">Diagram</a>
                <a href="http://localhost:5183/telemetry" target="_blank" rel="noreferrer">Telemetry</a>
                <a href="http://localhost:5183/alerts" target="_blank" rel="noreferrer">Alerts</a>
                <a href="http://localhost:5183/messages" target="_blank" rel="noreferrer">Messages</a>
                <a href="http://localhost:5183/replay" target="_blank" rel="noreferrer">History</a>
            </nav>

            <section class="status-panel">
                <div><strong>Locomotive:</strong> <span id="loco-id">KTZ-2001</span></div>
                <div><strong>Source:</strong> <span id="coord-source">Initializing...</span></div>
                <div><strong>Coordinates:</strong> <span id="coords">-</span></div>
                <div><strong>Updated:</strong> <span id="updated-at">-</span></div>
                <div><strong>Distance:</strong> <span id="distance">-</span></div>
            </section>
        </aside>

        <main class="content">
            <section class="map-top-overlay">
                <div class="overlay-title">Railway overlay API</div>
                <div class="overlay-meta">
                    <span id="overlay-endpoint">https://tiles.openrailwaymap.org/standard/{z}/{x}/{y}.png</span>
                    <span class="dot">•</span>
                    <span id="overlay-status">enabled</span>
                </div>
                <label class="overlay-toggle">
                    <input id="overlay-toggle" type="checkbox" checked />
                    Show OpenRailwayMap layer
                </label>
            </section>
            <div id="map"></div>
        </main>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="./app.js"></script>
</body>

</html>
