services:
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    ports:
      - "${KAFKA_PORT}:9092"

  timescaledb:
    image: timescale/timescaledb:2.15.3-pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
    restart: unless-stopped

  back_locomotive:
    build:
      context: ./back_locomotive
    command: ["sh", "-lc", "uvicorn app.main:app --host \"$LOCOMOTIVE_HOST\" --port \"$LOCOMOTIVE_PORT\""]
    environment:
      LOCOMOTIVE_HOST: ${LOCOMOTIVE_HOST}
      LOCOMOTIVE_PORT: ${LOCOMOTIVE_PORT}
      CORS_ORIGINS: ${CORS_ORIGINS}
      API_KEY: ${API_KEY}
      THRESHOLDS_FILE: ${THRESHOLDS_FILE}
      KAFKA_ENABLED: ${KAFKA_ENABLED}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      KAFKA_TOPIC_EVENTS: ${KAFKA_TOPIC_EVENTS}
      KAFKA_TOPIC_PARTITIONS: ${KAFKA_TOPIC_PARTITIONS}
      KAFKA_TOPIC_REPLICATION_FACTOR: ${KAFKA_TOPIC_REPLICATION_FACTOR}
    volumes:
      - ./shared:/runtime
    ports:
      - "${LOCOMOTIVE_PORT}:${LOCOMOTIVE_PORT}"
    depends_on:
      - kafka
    restart: unless-stopped

  back_dispatcher:
    build:
      context: ./back_dispatcher
    command: ["sh", "-lc", "uvicorn app.main:app --host \"$DISPATCHER_HOST\" --port \"$DISPATCHER_PORT\""]
    depends_on:
      back_locomotive:
        condition: service_started
      kafka:
        condition: service_started
      timescaledb:
        condition: service_healthy
    environment:
      DISPATCHER_HOST: ${DISPATCHER_HOST}
      DISPATCHER_PORT: ${DISPATCHER_PORT}
      CORS_ORIGINS: ${CORS_ORIGINS}
      API_KEY: ${API_KEY}
      THRESHOLDS_FILE: ${THRESHOLDS_FILE}
      LOCOMOTIVE_TARGETS: ${LOCOMOTIVE_TARGETS}
      RECONNECT_BASE_S: ${RECONNECT_BASE_S}
      RECONNECT_MAX_S: ${RECONNECT_MAX_S}
      PING_INTERVAL_S: ${PING_INTERVAL_S}
      INGEST_MODE: ${INGEST_MODE}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      KAFKA_TOPIC_EVENTS: ${KAFKA_TOPIC_EVENTS}
      KAFKA_GROUP_ID: ${KAFKA_GROUP_ID}
      DATABASE_URL: ${DATABASE_URL}
      DB_ECHO: ${DB_ECHO}
      TELEMETRY_RETENTION_HOURS: ${TELEMETRY_RETENTION_HOURS}
      RECENT_TELEMETRY_MAX_MINUTES: ${RECENT_TELEMETRY_MAX_MINUTES}
    volumes:
      - ./shared:/runtime
    ports:
      - "${DISPATCHER_PORT}:${DISPATCHER_PORT}"
    restart: unless-stopped

  front_locomotive:
    build:
      context: ./front_locomotive
      args:
        VITE_WS_URL: ${FRONT_LOCOMOTIVE_VITE_WS_URL}
        VITE_API_BASE_URL: ${FRONT_LOCOMOTIVE_VITE_API_BASE_URL}
        VITE_REPLAY_API_BASE_URL: ${FRONT_LOCOMOTIVE_VITE_REPLAY_API_BASE_URL}
        VITE_API_KEY: ${FRONT_LOCOMOTIVE_VITE_API_KEY}
        VITE_ENABLE_MOCKS: ${FRONT_LOCOMOTIVE_VITE_ENABLE_MOCKS}
    depends_on:
      - back_locomotive
    ports:
      - "${FRONT_LOCOMOTIVE_PORT}:80"
    restart: unless-stopped

  front_dispatcher:
    build:
      context: ./front_dispatcher
      args:
        VITE_WS_URL: ${FRONT_DISPATCHER_VITE_WS_URL}
        VITE_API_KEY: ${FRONT_DISPATCHER_VITE_API_KEY}
    depends_on:
      - back_dispatcher
    ports:
      - "${FRONT_DISPATCHER_PORT}:80"
    restart: unless-stopped

volumes:
  timescaledb_data:
